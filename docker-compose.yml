services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gamechecker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gamechecker}
      POSTGRES_DB: ${POSTGRES_DB:-gamechecker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gamechecker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies Prisma migrations, then exits. `web` waits for success.
  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gamechecker}:${POSTGRES_PASSWORD:-gamechecker}@db:5432/${POSTGRES_DB:-gamechecker}?schema=public
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gamechecker}:${POSTGRES_PASSWORD:-gamechecker}@db:5432/${POSTGRES_DB:-gamechecker}?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      EMUREADY_BASE_URL: ${EMUREADY_BASE_URL:-https://www.emuready.com/api/mobile/trpc}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
